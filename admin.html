<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin-top:100px;
}

.login-box{
background:white;
width:300px;
margin:auto;
padding:20px;
box-shadow:0 0 10px #ccc;
}

input{
width:90%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#c00;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234"){

window.location="editor.html";

}else{

alert("Wrong username or password");

}

}

</script>

</body>
</html>
