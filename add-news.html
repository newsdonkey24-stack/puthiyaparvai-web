<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add News</title>

<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
padding:10px 20px;
background:#c00;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

pre{
background:#eee;
padding:15px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<h2>Add News Generator</h2>

<input id="title" placeholder="Title">

<input id="location" placeholder="Location">

<input id="date" placeholder="Date">

<input id="reporter" placeholder="Reporter">

<input id="category" placeholder="Category">

<input id="image" placeholder="Main Image (example: cbm-news-1.jpeg)">

<textarea id="gallery" placeholder="Gallery images (one per line)"></textarea>

<textarea id="summary" placeholder="Summary"></textarea>

<textarea id="content" placeholder="Full News"></textarea>

<button type="button" onclick="generateJSON()">Generate JSON</button>

<h3>Generated JSON</h3>

<pre id="output"></pre>

<script>

function generateJSON(){

const title=document.getElementById("title").value;
const location=document.getElementById("location").value;
const date=document.getElementById("date").value;
const reporter=document.getElementById("reporter").value;
const category=document.getElementById("category").value;
const image=document.getElementById("image").value;

const galleryInput=document.getElementById("gallery").value;
const galleryLines=galleryInput.split("\n");

let gallery=[];

galleryLines.forEach(line=>{
if(line.trim()!=""){
gallery.push("images/news/"+line.trim());
}
});

const summary=document.getElementById("summary").value;
const content=document.getElementById("content").value;

let id=title.toLowerCase()
.replace(/[^\w\s]/gi,"")
.replace(/\s+/g,"-");

const json={
id:id,
title:title,
location:location,
date:date,
reporter:reporter,
category:category,
image:"images/news/"+image,
gallery:gallery,
summary:summary,
content:content.replace(/\n/g,"\n\n")
};

document.getElementById("output").textContent=
JSON.stringify(json,null,2);

}

</script>

</body>
</html>
