<script>
async function generate(){

  let title = document.getElementById("title").value;
  if(title==""){
    alert("Title required");
    return;
  }

  let location = document.getElementById("location").value;
  let date = document.getElementById("date").value;
  let reporter = document.getElementById("reporter").value;
  let category = document.getElementById("category").value;
  let image = document.getElementById("image").value;

  // Gallery
  let galleryLines = document.getElementById("gallery").value.split("\n");
  let gallery = [];

  galleryLines.forEach(line=>{
    if(line.trim()!=""){
      gallery.push("images/news/" + line.trim());
    }
  });

  let summary = document.getElementById("summary").value;
  let content = document.getElementById("content").value;

  // Unique ID
  let id = "news-" + Date.now();

  let json = {
    id: id,
    title: title,
    location: location,
    date: date,
    reporter: reporter,
    category: category,
    image: "images/news/" + image,
    gallery: gallery,
    summary: summary,
    content: content.replace(/\n/g,"\n\n")
  };

  // Show JSON
  document.getElementById("output").textContent =
  JSON.stringify(json,null,2);

  // 🔥 Auto Publish
  autoPublish(json);
}

async function autoPublish(jsonData){

  const token = "PASTE_YOUR_TOKEN_HERE";
  const repo = "newsdonkey24-stack/puthiyaparvai-web";
  const path = "news.json";

  try{

    let res = await fetch(https://api.github.com/repos/${repo}/contents/${path}, {
      headers: {
        Authorization: "token " + token
      }
    });

    let file = await res.json();
    let content = JSON.parse(atob(file.content));

    content.unshift(jsonData);

    await fetch(https://api.github.com/repos/${repo}/contents/${path}, {
      method: "PUT",
      headers: {
        Authorization: "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "News added",
        content: btoa(JSON.stringify(content, null, 2)),
        sha: file.sha
      })
    });

    alert("✅ News Published Successfully!");

  } catch(err){
    alert("❌ Error: " + err.message);
  }
}

// Image preview
document.getElementById("image").addEventListener("input", function(){
  let img = this.value;
  if(img){
    document.getElementById("preview").src = "../images/news/" + img;
  }
});
</script>
