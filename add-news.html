<script>
function generate(){

  let title = document.getElementById("title").value;

  if(title==""){
    alert("Title required");
    return;
  }

  let location = document.getElementById("location").value;
  let date = document.getElementById("date").value;
  let reporter = document.getElementById("reporter").value;
  let category = document.getElementById("category").value;
  let image = document.getElementById("image").value;

  // Gallery
  let galleryLines = document.getElementById("gallery").value.split("\n");
  let gallery = [];

  galleryLines.forEach(line=>{
    if(line.trim()!=""){
      gallery.push("images/news/" + line.trim());
    }
  });

  let summary = document.getElementById("summary").value;
  let content = document.getElementById("content").value;

  // ✅ UNIQUE ID FIX (VERY IMPORTANT)
  let id = "news-" + Date.now();

  let json = {
    id: id,
    title: title,
    location: location,
    date: date,
    reporter: reporter,
    category: category,
    image: "images/news/" + image,
    gallery: gallery,
    summary: summary,
    content: content.replace(/\n/g,"\n\n")
  };

  document.getElementById("output").textContent =
    JSON.stringify(json,null,2);
}
  document.getElementById("image").addEventListener("input", function(){
  let img = this.value;
  if(img){
    document.getElementById("preview").src = "../images/news/" + img;
  }
});
</script>
