<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add News</title>

<style>
body{
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input, textarea{
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  font-size: 16px;
}

button{
  padding: 10px 20px;
  background: #c00;
  color: white;
  border: none;
  cursor: pointer;
}

img{
  max-width: 200px;
  margin-top: 10px;
}
</style>

</head>

<body>

<h2>Add News</h2>

<input id="title" placeholder="Title">
<input id="location" placeholder="Location">
<input id="date" placeholder="Date">
<input id="reporter" placeholder="Reporter">
<input id="category" placeholder="Category">

<input id="image" placeholder="Image name (example: test.jpg)">
<img id="preview">

<textarea id="gallery" placeholder="Gallery images (one per line)"></textarea>

<textarea id="summary" placeholder="Summary"></textarea>

<textarea id="content" placeholder="Full News"></textarea>

<button onclick="generate()">Generate JSON</button>

<h3>Output</h3>
<pre id="output"></pre>

<script>

function generate(){

let title = document.getElementById("title").value;
if(title==""){
  alert("Title required");
  return;
}

let location = document.getElementById("location").value;
let date = document.getElementById("date").value;
let reporter = document.getElementById("reporter").value;
let category = document.getElementById("category").value;
let image = document.getElementById("image").value;

let galleryLines = document.getElementById("gallery").value.split("\n");
let gallery = [];

galleryLines.forEach(line=>{
  if(line.trim()!=""){
    gallery.push("images/news/" + line.trim());
  }
});

let summary = document.getElementById("summary").value;
let content = document.getElementById("content").value;

// ✅ UNIQUE ID
let id = "news-" + Date.now();

let json = {
  id: id,
  title: title,
  location: location,
  date: date,
  reporter: reporter,
  category: category,
  image: "images/news/" + image,
  gallery: gallery,
  summary: summary,
  content: content.replace(/\n/g,"\n\n")
};

document.getElementById("output").textContent =
JSON.stringify(json,null,2);

}

// ✅ IMAGE PREVIEW
document.getElementById("image").addEventListener("input", function(){
  let img = this.value;
  if(img){
    document.getElementById("preview").src = "images/news/" + img;
  }
});

</script>

</body>
</html>
