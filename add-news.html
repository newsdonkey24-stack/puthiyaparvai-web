<!DOCTYPE html>
<html>
<head>
  <title>Add News</title>
  <meta charset="UTF-8">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    pre {
      background: #000;
      color: #0f0;
      padding: 10px;
      overflow: auto;
    }
  </style>
</head>

<body>

<div class="container">

<h2>📰 Add News</h2>

<input id="title" placeholder="Title">
<input id="location" placeholder="Location">
<input id="date" placeholder="Date">
<input id="reporter" placeholder="Reporter">
<input id="category" placeholder="Category">
<input id="image" placeholder="Main Image (ex: img1.jpg)">

<textarea id="gallery" placeholder="Gallery images (one per line)"></textarea>
<textarea id="summary" placeholder="Summary"></textarea>
<textarea id="content" placeholder="Full Content"></textarea>

<button onclick="generate()">Generate News JSON</button>

<h3>📦 Output</h3>
<pre id="output"></pre>

</div>

<script>
function generate(){

  let title = document.getElementById("title").value;
  if(title==""){
    alert("Title required");
    return;
  }

  let location = document.getElementById("location").value;
  let date = document.getElementById("date").value;
  let reporter = document.getElementById("reporter").value;
  let category = document.getElementById("category").value;
  let image = document.getElementById("image").value;

  let galleryLines = document.getElementById("gallery").value.split("\n");
  let gallery = [];

  galleryLines.forEach(line=>{
    if(line.trim()!=""){
      gallery.push("images/news/" + line.trim());
    }
  });

  let summary = document.getElementById("summary").value;
  let content = document.getElementById("content").value;

  let id = "news-" + Date.now();

  let json = {
    id: id,
    title: title,
    location: location,
    date: date,
    reporter: reporter,
    category: category,
    image: "images/news/" + image,
    gallery: gallery,
    summary: summary,
    content: content.replace(/\n/g,"\n\n")
  };

  document.getElementById("output").textContent =
    JSON.stringify(json, null, 2);
}
</script>

</body>
</html>
