<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add News</title>

<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px 20px;
background:#c00;
color:white;
border:none;
cursor:pointer;
}

pre{
background:#eee;
padding:15px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<h2>Add News Generator</h2>

<input id="title" placeholder="Title">

<input id="location" placeholder="Location">

<input id="date" placeholder="Date">

<input id="reporter" placeholder="Reporter">

<input id="category" placeholder="Category">

<input id="image" placeholder="Main Image (example: cbm-news-1.jpeg)">

<textarea id="gallery" placeholder="Gallery images (one per line)"></textarea>

<textarea id="summary" placeholder="Summary"></textarea>

<textarea id="content" placeholder="Full News"></textarea>

<button type="button" onclick="generate()">Generate JSON</button>

<h3>Generated JSON</h3>

<pre id="output"></pre>

<script>

function generate(){

let title=document.getElementById("title").value;

let location=document.getElementById("location").value;

let date=document.getElementById("date").value;

let reporter=document.getElementById("reporter").value;

let category=document.getElementById("category").value;

let image=document.getElementById("image").value;

let gallery=document.getElementById("gallery").value.split("\n");

let summary=document.getElementById("summary").value;

let content=document.getElementById("content").value;

let id=title
.toLowerCase()
.replace(/[^\w\s]/gi,'')
.replace(/\s+/g,'-');

let galleryJSON="";

gallery.forEach(img=>{
if(img.trim()!=""){
galleryJSON+="images/news/${img.trim()}",;
}
});

galleryJSON=galleryJSON.slice(0,-1);

let json=`
{
"id":"${id}",
"title":"${title}",
"location":"${location}",
"date":"${date}",
"reporter":"${reporter}",
"category":"${category}",
"image":"images/news/${image}",
"gallery":[${galleryJSON}],
"summary":"${summary}",
"content":"${content.replace(/\n/g,"\\n\\n")}"
}
`;

document.getElementById("output").innerText=json;

}

</script>

</body>
</html>
