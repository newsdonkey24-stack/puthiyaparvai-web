<!DOCTYPE html>
<html>
<head>
  <title>Add News</title>
  <meta charset="UTF-8">
</head>

<body>

<h2>📰 Add News</h2>

<input id="title" placeholder="Title"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="date" placeholder="Date"><br><br>
<input id="reporter" placeholder="Reporter"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="image" placeholder="Main Image (ex: img1.jpg)"><br><br>

<textarea id="gallery" placeholder="Gallery images (one per line)"></textarea><br><br>

<textarea id="summary" placeholder="Summary"></textarea><br><br>

<textarea id="content" placeholder="Full Content"></textarea><br><br>

<button onclick="generate()">Generate News JSON</button>

<h3>📦 Output</h3>
<pre id="output"></pre>

<script>
function generate(){

  let title = document.getElementById("title").value;
  if(title==""){
    alert("Title required");
    return;
  }

  let location = document.getElementById("location").value;
  let date = document.getElementById("date").value;
  let reporter = document.getElementById("reporter").value;
  let category = document.getElementById("category").value;
  let image = document.getElementById("image").value;

  // Gallery
  let galleryLines = document.getElementById("gallery").value.split("\n");
  let gallery = [];

  galleryLines.forEach(line=>{
    if(line.trim()!=""){
      gallery.push("images/news/" + line.trim());
    }
  });

  let summary = document.getElementById("summary").value;
  let content = document.getElementById("content").value;

  // Unique ID
  let id = "news-" + Date.now();

  let json = {
    id: id,
    title: title,
    location: location,
    date: date,
    reporter: reporter,
    category: category,
    image: "images/news/" + image,
    gallery: gallery,
    summary: summary,
    content: content.replace(/\n/g,"\n\n")
  };

  document.getElementById("output").textContent =
    JSON.stringify(json, null, 2);
}
</script>

</body>
</html>
